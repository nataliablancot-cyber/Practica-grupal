version: '3.8'

services:

  fastapi:
    build:
      context: ./fastapi
      dockerfile: Dockerfile
    container_name: fastapi
    ports:
      - "8000:8000"
    networks:
      - deploy_network
    environment:
      - DATABASE_URL=sqlite:////data/database.db
    volumes:
      - mis_datos:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/libros/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  streamlit:
    build:
      context: ./streamlit
      dockerfile: Dockerfile
    container_name: streamlit
    ports:
      - "8501:8501"
    depends_on:
      fastapi:
        condition: service_healthy
    networks:
      - deploy_network
    environment:
      - API_URL=http://fastapi:8000
    restart: unless-stopped

networks:
  deploy_network:
    driver: bridge

volumes:
  mis_datos:
